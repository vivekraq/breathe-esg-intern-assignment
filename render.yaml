services:
  - type: web
    name: breathe-esg-api
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && python manage.py seed_demo && gunicorn breathe.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
  - type: static
    name: breathe-esg-web
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://breathe-esg-api.onrender.com/api"

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
